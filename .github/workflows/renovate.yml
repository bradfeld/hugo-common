name: renovate
# Self-hosted Renovate runner for the PRIVATE Feld Hugo sites.
#
# Why this exists: Mend's hosted Renovate cloud auto-onboarded the PUBLIC template
# (hugo-site-template) in ~51s and auto-merged its bumps, but the four PRIVATE sites
# got zero jobs for 24h+ — despite the GitHub App having All-repos access and
# byte-identical renovate.json configs. Rather than depend on Mend's opaque
# private-repo handling, we run Renovate ourselves from here.
#
# Each target repo keeps its own renovate.json (extends bradfeld/hugo-common), so the
# bump + smoke-gated-automerge policy is unchanged. This workflow only supplies the
# runner and the token.
#
# RENOVATE_TOKEN must be a PAT or GitHub App token — NOT the default GITHUB_TOKEN —
# so Renovate's PRs trigger each site's smoke.yml (events from GITHUB_TOKEN do not
# trigger other workflows). Store it as an Actions secret on bradfeld/hugo-common.
# Required scope on the four sites + read on hugo-common (for the shared preset):
# contents:write, pull-requests:write, issues:write, workflows:write.

on:
  schedule:
    - cron: "0 */4 * * *" # every 4h; Renovate's own rate limits prevent spam
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        default: "info"
        type: choice
        options: [info, debug]

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_REPOSITORIES: bradfeld/feld.com,bradfeld/foundry.vc,bradfeld/adventuresinclaude,bradfeld/zeroknowledge
          # These repos have no branch protection, so GitHub native auto-merge would
          # merge instantly with no check to wait on. Disable it — Renovate then waits
          # for the smoke check to go green and merges via API itself, matching how the
          # Mend-hosted template behaves.
          RENOVATE_PLATFORM_AUTOMERGE: "false"
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
