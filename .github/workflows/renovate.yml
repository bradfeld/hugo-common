name: renovate
# Self-hosted Renovate runner for the PRIVATE Feld Hugo sites.
#
# Why this exists: Mend's hosted Renovate cloud auto-onboarded the PUBLIC template
# (hugo-site-template) but never ran jobs on the four PRIVATE sites despite All-repos
# GitHub App access and identical configs. So we run Renovate ourselves from here.
#
# Auth: a dedicated GitHub App (feld-hugo-renovate, app-id 4060878) installed on the
# four sites. Each run mints a short-lived installation token via
# actions/create-github-app-token — no PAT, no expiry, no manual rotation, and PRs are
# authored by the app (bot identity). The token also triggers each site's smoke.yml
# (app/installation tokens trigger workflows, unlike the default GITHUB_TOKEN).
# Only the app's private key is a secret (RENOVATE_APP_PRIVATE_KEY on this repo); the
# app id is not sensitive and is inlined below.
#
# Each target repo keeps its own renovate.json (extends this repo's preset), which
# scopes management to Hugo (hugo-extended) + the hugo-common submodule only.

on:
  schedule:
    - cron: "0 */4 * * *" # every 4h; Renovate's own rate limits prevent spam
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        default: "info"
        type: choice
        options: [info, debug]

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Mint an installation token from the feld-hugo-renovate GitHub App
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          app-id: "4060878"
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: bradfeld
          repositories: feld.com,foundry.vc,adventuresinclaude,zeroknowledge

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_REPOSITORIES: bradfeld/feld.com,bradfeld/foundry.vc,bradfeld/adventuresinclaude,bradfeld/zeroknowledge
          # No branch protection on these repos, so GitHub native auto-merge would merge
          # instantly with nothing to gate on. Disable it: Renovate waits for the smoke
          # check to go green and merges via API itself.
          RENOVATE_PLATFORM_AUTOMERGE: "false"
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
